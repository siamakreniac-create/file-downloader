name: دانلود و آرشیو فایل (Raven)

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل (Direct URL)'
        required: true
        type: string
      file_rename:
        description: 'نام دلخواه برای فایل با پسوند (اختیاری)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  download-and-archive:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 بررسی دسترسی به مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 📦 نصب ابزارهای لازم
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full

      - name: 🔍 استخراج نام فایل از لینک
        id: filename
        run: |
          URL="${{ github.event.inputs.file_url }}"
          
          # حذف query string و fragment
          CLEAN_URL="${URL%%\?*}"
          CLEAN_URL="${CLEAN_URL%%#*}"
          
          RAW_NAME=$(basename "$CLEAN_URL" | tr -d '\r\n')
          
          # اگر نام خالی بود از نام پیش‌فرض استفاده کن
          if [[ -z "$RAW_NAME" || "$RAW_NAME" == "/" ]]; then
            RAW_NAME="downloaded_file"
          fi
          
          EXT="${RAW_NAME##*.}"
          if [[ "$EXT" == "$RAW_NAME" ]]; then
            EXT=""
          fi
          BASE="${RAW_NAME%.*}"
          
          echo "raw_name=$RAW_NAME" >> $GITHUB_OUTPUT
          echo "base=$BASE" >> $GITHUB_OUTPUT
          echo "ext=$EXT" >> $GITHUB_OUTPUT
          
          echo "📋 نام اصلی فایل: $RAW_NAME"

      - name: ⬇️ دانلود فایل (پشتیبانی از redirect‌های پیچیده)
        id: download
        run: |
          RAW_NAME="${{ steps.filename.outputs.raw_name }}"
          URL="${{ github.event.inputs.file_url }}"

          # استخراج دامنه برای Referer
          DOMAIN=$(echo "$URL" | awk -F/ '{printf "%s//%s", $1, $3}')

          echo "⬇️ در حال دانلود فایل با مدیریت redirect..."
          curl -L --fail --retry 5 --retry-delay 10 \
               --connect-timeout 20 --max-time 1200 \
               -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               -H "Accept: */*" \
               -H "Accept-Language: en-US,en;q=0.9" \
               -H "Referer: $DOMAIN/" \
               -H "Origin: $DOMAIN" \
               -c cookies.txt -b cookies.txt \
               -o "$RAW_NAME" \
               "$URL"

          # اگر خطا داد، با wget تلاش کن (در صورت نصب)
          if [[ $? -ne 0 ]]; then
            echo "curl شکست خورد، تلاش با wget..."
            sudo apt-get install -y -qq wget
            wget --tries=5 --timeout=1200 \
                 --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                 --referer="$DOMAIN/" \
                 --keep-session-cookies --save-cookies cookies.txt --load-cookies cookies.txt \
                 -O "$RAW_NAME" "$URL"
          fi

          SIZE=$(stat -c %s "$RAW_NAME" 2>/dev/null || echo "0")
          SIZE_MB=$(( SIZE / 1048576 ))
          echo "✅ دانلود کامل شد: $RAW_NAME (${SIZE_MB}MB)"
          
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: 🏷️ تعیین نام نهایی فایل
        id: naming
        run: |
          RAW_NAME="${{ steps.filename.outputs.raw_name }}"
          BASE="${{ steps.filename.outputs.base }}"
          EXT="${{ steps.filename.outputs.ext }}"
          CUSTOM_NAME="${{ github.event.inputs.file_rename }}"
          
          if [[ -n "$CUSTOM_NAME" ]]; then
            FINAL_NAME="Raven_${CUSTOM_NAME}"
            if [[ "$CUSTOM_NAME" == *.* ]]; then
              ARCHIVE_BASE="Raven_${CUSTOM_NAME%.*}"
            else
              ARCHIVE_BASE="Raven_${CUSTOM_NAME}"
            fi
          else
            FINAL_NAME="Raven_${RAW_NAME}"
            ARCHIVE_BASE="Raven_${BASE}"
          fi
          
          echo "final_name=$FINAL_NAME" >> $GITHUB_OUTPUT
          echo "archive_base=$ARCHIVE_BASE" >> $GITHUB_OUTPUT
          
          echo "🏷️ نام نهایی فایل: $FINAL_NAME"
          echo "📦 پیشوند آرشیو: $ARCHIVE_BASE"

      - name: ✏️ تغییر نام فایل
        run: |
          RAW_NAME="${{ steps.filename.outputs.raw_name }}"
          FINAL_NAME="${{ steps.naming.outputs.final_name }}"
          mv "$RAW_NAME" "$FINAL_NAME"
          echo "✅ فایل به $FINAL_NAME تغییر نام یافت"

      - name: 🗜️ ساخت آرشیو
        run: |
          ARCHIVE_BASE="${{ steps.naming.outputs.archive_base }}"
          FINAL_NAME="${{ steps.naming.outputs.final_name }}"
          
          echo "🗜️ در حال ساخت آرشیو (هر تکه ۹۵MB)..."
          7z a -mx=1 -v95m "${ARCHIVE_BASE}.7z" "$FINAL_NAME"
          
          echo "✅ آرشیو ساخته شد:"
          ls -lh "${ARCHIVE_BASE}.7z"* 2>/dev/null || echo "هیچ فایلی ساخته نشد"

      - name: 📁 سازمان‌دهی فایل‌ها
        id: organize
        run: |
          ARCHIVE_BASE="${{ steps.naming.outputs.archive_base }}"
          
          # شمارش تعداد تکه‌ها
          CHUNK_COUNT=$(ls "${ARCHIVE_BASE}.7z."* 2>/dev/null | wc -l)
          
          SINGLE_CHUNK_AS_001=false
          if [[ $CHUNK_COUNT -eq 1 ]] && [[ -f "${ARCHIVE_BASE}.7z.001" ]]; then
            # فقط یک تکه است → تغییر نام به .7z ساده
            mv "${ARCHIVE_BASE}.7z.001" "${ARCHIVE_BASE}.7z"
            echo "📄 فایل کوچک (تک‌تکه) → تغییر نام به ${ARCHIVE_BASE}.7z"
            echo "is_multi=false" >> $GITHUB_OUTPUT
          elif [[ $CHUNK_COUNT -gt 1 ]]; then
            # چند تکه → ساخت پوشه و انتقال
            FOLDER_NAME="${ARCHIVE_BASE}"
            # اگر پوشه‌ای با این نام وجود دارد، یک پسوند اضافه کن
            if [[ -d "$FOLDER_NAME" ]]; then
              FOLDER_NAME="${ARCHIVE_BASE}_files"
            fi
            mkdir -p "$FOLDER_NAME"
            mv "${ARCHIVE_BASE}.7z."* "$FOLDER_NAME/" 2>/dev/null || true
            echo "📁 فایل‌های تکه‌تکه به پوشه $FOLDER_NAME/ منتقل شدند"
            echo "is_multi=true" >> $GITHUB_OUTPUT
            echo "folder=$FOLDER_NAME" >> $GITHUB_OUTPUT
          else
            # فایل .7z ساده از قبل وجود دارد
            echo "📄 فایل کوچک → در ریشه باقی می‌ماند"
            echo "is_multi=false" >> $GITHUB_OUTPUT
          fi

      - name: 🗑️ حذف فایل اصلی
        run: |
          rm -f "${{ steps.naming.outputs.final_name }}"
          echo "✅ فایل اصلی حذف شد"

      - name: ⚙️ تنظیمات Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: ⬆️ آپلود به مخزن
        run: |
          IS_MULTI="${{ steps.organize.outputs.is_multi }}"
          ARCHIVE_BASE="${{ steps.naming.outputs.archive_base }}"
          FOLDER="${{ steps.organize.outputs.folder }}"
          
          if [[ "$IS_MULTI" == "true" ]]; then
            # اضافه کردن پوشه
            git add "$FOLDER/"
          else
            # اضافه کردن تک فایل .7z
            git add "${ARCHIVE_BASE}.7z"
          fi
          
          echo "📊 وضعیت staging:"
          git status
          
          if ! git diff --staged --quiet; then
            git commit -m "📦 Raven: ${ARCHIVE_BASE}"
            echo "⬆️ در حال آپلود..."
            if git push origin HEAD; then
              echo "✅ آپلود موفقیت‌آمیز بود!"
            else
              echo "❌ خطا در آپلود. لطفاً دوباره تلاش کنید."
              exit 1
            fi
          else
            echo "⚠️ هیچ فایلی stage نشده است!"
            echo "📁 محتویات پوشه:"
            ls -la
            exit 1
          fi

      - name: 🎉 گزارش نهایی
        run: |
          ARCHIVE_BASE="${{ steps.naming.outputs.archive_base }}"
          FOLDER="${{ steps.organize.outputs.folder }}"
          IS_MULTI="${{ steps.organize.outputs.is_multi }}"
          
          echo ""
          echo "=============================================="
          echo "🎉 عملیات با موفقیت انجام شد!"
          if [[ "$IS_MULTI" == "true" ]]; then
            echo "📁 فایل‌ها در پوشه ${FOLDER}/ قرار دارند."
          else
            echo "📄 فایل در ریشه مخزن (${ARCHIVE_BASE}.7z) ذخیره شد."
          fi
          echo "📥 حالا می‌توانید از صفحه اصلی مخزن دانلود کنید."
          echo "=============================================="
